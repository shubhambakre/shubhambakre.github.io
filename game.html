<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>The Engineer's Path — Shubham Bakre</title>
<meta name="description" content="An interactive Monument Valley-style journey through Shubham Bakre's engineering career." />
<meta property="og:title" content="The Engineer's Path — Shubham Bakre" />
<meta property="og:description" content="An interactive Monument Valley-style journey through a senior engineer's career." />
<link rel="canonical" href="https://shubhambakre.com/game.html" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#1a1230;
    font-family:'Inter',-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    color:#fefdf6;
  }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }

  /* Top chrome */
  #chrome {
    position:fixed; top:24px; left:24px; right:24px;
    display:flex; justify-content:space-between; align-items:flex-start;
    z-index:10; pointer-events:none;
  }
  #chrome > * { pointer-events:auto; }

  #chapter {
    background:rgba(26,18,48,0.55);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:16px 22px;
    max-width:340px;
    transform:translateY(-12px); opacity:0;
    transition:transform .65s cubic-bezier(.2,.8,.3,1), opacity .65s ease;
  }
  #chapter.show { transform:none; opacity:1; }
  #ch-num {
    font-family:'JetBrains Mono',monospace;
    font-size:10px; font-weight:500; letter-spacing:0.22em;
    color:rgba(255,228,180,0.85); text-transform:uppercase;
    margin-bottom:8px;
  }
  #ch-title {
    font-size:20px; font-weight:300; letter-spacing:-0.02em;
    color:#fefdf6; line-height:1.2; margin-bottom:6px;
  }
  #ch-body {
    font-size:12.5px; color:rgba(254,253,246,0.62);
    line-height:1.55;
  }

  #back-link {
    display:inline-flex; align-items:center; gap:7px;
    padding:9px 16px; border-radius:100px;
    background:rgba(26,18,48,0.55);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08);
    color:rgba(254,253,246,0.65);
    font-size:11px; font-weight:500; letter-spacing:0.04em;
    text-decoration:none;
    transition:color .2s, border-color .2s, background .2s;
  }
  #back-link:hover {
    color:#fefdf6;
    border-color:rgba(255,255,255,0.20);
    background:rgba(26,18,48,0.75);
  }
  #back-link svg { width:11px; height:11px; }

  /* Bottom chrome */
  #foot {
    position:fixed; bottom:28px; left:0; right:0;
    z-index:10; display:flex; flex-direction:column; align-items:center; gap:14px;
    pointer-events:none;
  }
  #pips { display:flex; gap:8px; }
  .pip {
    width:6px; height:6px; border-radius:50%;
    background:rgba(255,255,255,0.16);
    transition:background .4s, transform .4s;
  }
  .pip.done { background:rgba(255,228,180,0.55); }
  .pip.now { background:rgba(255,228,180,1); transform:scale(1.55); }

  #hint {
    font-family:'JetBrains Mono',monospace;
    font-size:10px; font-weight:500; letter-spacing:0.18em;
    color:rgba(255,255,255,0.30); text-transform:uppercase;
    transition:opacity 1s;
  }
  #hint kbd {
    display:inline-block;
    padding:3px 7px; margin:0 3px;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14);
    border-radius:4px; font-family:inherit; font-size:9px;
  }

  /* Mobile arrows */
  #mctl {
    position:fixed; bottom:80px; left:0; right:0;
    display:flex; justify-content:center; gap:14px;
    z-index:10; pointer-events:none;
  }
  .mb {
    width:54px; height:54px; border-radius:50%;
    background:rgba(26,18,48,0.55);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.10);
    color:rgba(254,253,246,0.65); font-size:20px;
    display:flex; align-items:center; justify-content:center;
    pointer-events:auto; cursor:pointer; user-select:none;
    -webkit-tap-highlight-color:transparent;
    transition:background .15s;
  }
  .mb:active { background:rgba(255,255,255,0.16); color:#fff; }
  @media (min-width:768px) { #mctl { display:none; } }

  /* End-state CTA — bottom centred so it doesn't cover the tower */
  #end-cta {
    position:fixed; left:50%; bottom:90px;
    transform:translate(-50%,16px);
    opacity:0; transition:opacity .8s ease, transform .8s cubic-bezier(.2,.8,.3,1);
    pointer-events:none; z-index:11;
    text-align:center;
  }
  #end-cta.show {
    opacity:1; transform:translate(-50%,0);
    pointer-events:auto;
  }
  #end-cta::before {
    content:'YOU REACHED THE SUMMIT';
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px; font-weight:500; letter-spacing:0.22em;
    color:rgba(255,228,180,0.65); margin-bottom:14px;
  }
  #end-cta a {
    display:inline-flex; align-items:center; gap:9px;
    padding:13px 26px; border-radius:100px;
    background:#fefdf6; color:#1a1230;
    font-size:13px; font-weight:500; letter-spacing:-0.005em;
    text-decoration:none;
    transition:transform .2s;
  }
  #end-cta a:hover { transform:scale(1.04); }
  #end-cta svg { width:13px; height:13px; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="chrome">
  <div id="chapter">
    <div id="ch-num">CHAPTER 01 · OF 05</div>
    <div id="ch-title">The Foundation</div>
    <div id="ch-body">A degree in Phoenix, a city in the Bay, a question — what could a system actually do?</div>
  </div>
  <a href="/" id="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Portfolio
  </a>
</div>

<div id="mctl">
  <button class="mb" data-a="back">←</button>
  <button class="mb" data-a="fwd">→</button>
</div>

<div id="foot">
  <div id="pips">
    <div class="pip now"></div><div class="pip"></div><div class="pip"></div>
    <div class="pip"></div><div class="pip"></div>
  </div>
  <div id="hint"><kbd>→</kbd> to continue · <kbd>←</kbd> back · or tap</div>
</div>

<div id="end-cta">
  <a href="/">
    Return to portfolio
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
  </a>
</div>

<script>
// ════════════════════════════════════════════════════
//  THE ENGINEER'S PATH
//  An isometric Monument Valley-style portfolio scene
// ════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let DW, DH, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  DW = window.innerWidth;
  DH = window.innerHeight;
  canvas.width  = DW * DPR;
  canvas.height = DH * DPR;
  canvas.style.width  = DW + 'px';
  canvas.style.height = DH + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── Isometric projection ──
const ISO = { TW: 78, TH: 39, BH: 56 };

function project(x, y, z) {
  return {
    sx: (x - z) * ISO.TW * 0.5,
    sy: (x + z) * ISO.TH * 0.5 - y * ISO.BH,
  };
}
let originX = 0, originY = 0;
const world = (x, y, z) => {
  const p = project(x, y, z);
  return { sx: p.sx + originX, sy: p.sy + originY };
};

// ── Chapters ──
const CHAPTERS = [
  { num:'01', title:'The Foundation',
    body:"Arizona State, MS in Computer Science. Mornings reading papers, nights writing tensors that wouldn't compile." },
  { num:'02', title:'The First Path',
    body:"Zelle, then American Express. High-value payments, fraud signals, the discipline of code that cannot fail." },
  { num:'03', title:'The Climb',
    body:"Choice Hotels. Spark, Hadoop, Airflow at scale. Learning that data is never clean, only quietly negotiated." },
  { num:'04', title:'The Pinnacle',
    body:"Walmart Global Tech. 550 million SKUs. An LLM chatbot that needs no SQL. Production AI, every day." },
  { num:'05', title:'The Summit',
    body:"Open to senior AI engineering roles in the Bay Area. If you're building what comes next — let's talk." },
];

// ── Tower structure (cubes at integer x,y,z) ──
const STRUCTURE = [];
// Foundation: 4×4 at y=0
for (let x = -1; x <= 2; x++)
  for (let z = -1; z <= 2; z++)
    STRUCTURE.push({ x, y:0, z, tier:0 });
// Stair on south-east edge (y=1)
STRUCTURE.push({ x:2, y:1, z:2, tier:1 });
// Mid platform: 3×3 at y=1
for (let x = 0; x <= 2; x++)
  for (let z = 0; z <= 2; z++)
    STRUCTURE.push({ x, y:1, z, tier:1 });
// Stair to upper (y=2)
STRUCTURE.push({ x:0, y:2, z:0, tier:2 });
// Upper platform: 2×2 at y=2 (offset)
for (let x = 0; x <= 1; x++)
  for (let z = -1; z <= 0; z++)
    STRUCTURE.push({ x, y:2, z, tier:2 });
// Crown approach + tower
STRUCTURE.push({ x:1, y:3, z:-1, tier:3 });
STRUCTURE.push({ x:1, y:3, z:-2, tier:3 });
STRUCTURE.push({ x:1, y:4, z:-2, tier:4 });

// Sort back-to-front for painter's algorithm
const SORTED = [...STRUCTURE].sort((a, b) => (a.x + a.z + a.y * 0.5) - (b.x + b.z + b.y * 0.5));

// ── Path: standing positions (y = top-of-cube level you're walking on) ──
const PATH = [
  { x:-1, y:1, z:-1, chapter:0 },
  { x:0,  y:1, z:-1 },
  { x:1,  y:1, z:-1 },
  { x:2,  y:1, z:-1 },
  { x:2,  y:1, z:0 },
  { x:2,  y:1, z:1 },
  { x:2,  y:1, z:2, chapter:1 },
  { x:2,  y:2, z:2 },
  { x:2,  y:2, z:1 },
  { x:2,  y:2, z:0, chapter:2 },
  { x:1,  y:2, z:0 },
  { x:0,  y:2, z:0 },
  { x:0,  y:3, z:0, chapter:3 },
  { x:0,  y:3, z:-1 },
  { x:1,  y:3, z:-1 },
  { x:1,  y:4, z:-1 },
  { x:1,  y:4, z:-2 },
  { x:1,  y:5, z:-2, chapter:4 },
];

// ── Tier palette (Monument Valley pastel architecture) ──
const TIERS = [
  { top:'#e8c074', left:'#b89254', right:'#7a5e2e' }, // foundation — gold sand
  { top:'#d49797', left:'#a86c6c', right:'#7a4848' }, // mid — peachy rose
  { top:'#c896e8', left:'#9c70b8', right:'#6f4d8a' }, // upper — lavender
  { top:'#9bc6e8', left:'#6f9ec0', right:'#4c7894' }, // crown base — sky blue
  { top:'#fefdf6', left:'#c9c4a8', right:'#928e74' }, // crown top — cream
];

// ── Sky gradient (dusk → dawn) ──
const SKY = ['#1a1230', '#2a1f4a', '#583a64', '#a86b75', '#e8a98c'];

// ── Stars + drifting dust ──
const STARS = Array.from({length:90}, () => ({
  x: Math.random(), y: Math.random()*0.45,
  s: Math.random()<0.18 ? 1.6 : 1,
  a: 0.25 + Math.random()*0.45,
  tw: Math.random()*Math.PI*2,
}));
const DUST = Array.from({length:18}, () => ({
  x: Math.random()*1.2 - 0.1, y: Math.random()*0.85,
  v: 0.00012 + Math.random()*0.00018,
  s: 0.6 + Math.random()*1.4,
  a: 0.10 + Math.random()*0.18,
}));

// ── Input ──
window.addEventListener('keydown', e => {
  if (['ArrowRight','KeyD','Space','Enter'].includes(e.code)) { e.preventDefault(); advance(+1); }
  if (['ArrowLeft','KeyA'].includes(e.code))                  { e.preventDefault(); advance(-1); }
});

document.querySelectorAll('.mb').forEach(b => {
  const a = b.dataset.a;
  const fire = (e) => { e.preventDefault(); advance(a === 'fwd' ? 1 : -1); };
  b.addEventListener('touchstart', fire, { passive:false });
  b.addEventListener('mousedown', fire);
});

let tStartX = null;
canvas.addEventListener('touchstart', e => { tStartX = e.touches[0].clientX; }, { passive:true });
canvas.addEventListener('touchend', e => {
  if (tStartX === null) return;
  const dx = e.changedTouches[0].clientX - tStartX;
  if (Math.abs(dx) > 28) advance(dx > 0 ? 1 : -1);
  tStartX = null;
}, { passive:true });
canvas.addEventListener('click', () => advance(+1));

// ── Chapter UI ──
const chEl   = document.getElementById('chapter');
const chNum  = document.getElementById('ch-num');
const chTit  = document.getElementById('ch-title');
const chBod  = document.getElementById('ch-body');
const pips   = [...document.querySelectorAll('.pip')];
const hintEl = document.getElementById('hint');
const endCTA = document.getElementById('end-cta');
let hintHidden = false;
let lastChapterShown = 0;

function showChapter(idx) {
  if (idx === lastChapterShown && chEl.classList.contains('show')) return;
  lastChapterShown = idx;
  const c = CHAPTERS[idx];
  chEl.classList.remove('show');
  setTimeout(() => {
    chNum.textContent = `CHAPTER ${c.num} · OF 05`;
    chTit.textContent = c.title;
    chBod.textContent = c.body;
    pips.forEach((p,i) => p.className = 'pip' + (i < idx ? ' done' : i === idx ? ' now' : ''));
    chEl.classList.add('show');
    if (idx === CHAPTERS.length - 1) endCTA.classList.add('show');
    else endCTA.classList.remove('show');
  }, 180);
}
showChapter(0);

// ── Path traversal ──
let pathIdx    = 0;
let targetIdx  = 0;
let interpFrom = null;
let interpTo   = PATH[0];
let interpT    = 1;  // already at start

function ease(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2; }

function currentPos() {
  if (interpFrom && interpT < 1) {
    const t = ease(interpT);
    return {
      x: interpFrom.x + (interpTo.x - interpFrom.x) * t,
      y: interpFrom.y + (interpTo.y - interpFrom.y) * t,
      z: interpFrom.z + (interpTo.z - interpFrom.z) * t,
    };
  }
  return PATH[pathIdx];
}

function advance(dir) {
  const next = Math.max(0, Math.min(PATH.length - 1, targetIdx + dir));
  if (next === targetIdx) return;
  if (!hintHidden) { hintEl.style.opacity = '0'; hintHidden = true; }
  interpFrom = currentPos();
  targetIdx  = next;
  interpTo   = PATH[targetIdx];
  interpT    = 0;
}

// ── Drawing ──
function poly(pts) {
  ctx.beginPath();
  ctx.moveTo(pts[0].sx, pts[0].sy);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].sx, pts[i].sy);
  ctx.closePath();
  ctx.fill();
}

function drawCube(cube) {
  const t = TIERS[cube.tier];
  const { x, y, z } = cube;
  const a  = world(x,   y+1, z);
  const b  = world(x+1, y+1, z);
  const c  = world(x+1, y+1, z+1);
  const d  = world(x,   y+1, z+1);
  const b2 = world(x+1, y,   z);
  const c2 = world(x+1, y,   z+1);
  const d2 = world(x,   y,   z+1);

  ctx.fillStyle = t.right;  poly([b, c, c2, b2]);
  ctx.fillStyle = t.left;   poly([d, c, c2, d2]);
  ctx.fillStyle = t.top;    poly([a, b, c, d]);

  // Subtle top edge highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy);
  ctx.lineTo(c.sx, c.sy); ctx.lineTo(d.sx, d.sy);
  ctx.closePath();
  ctx.stroke();
}

function drawTower() {
  for (const cube of SORTED) drawCube(cube);
}

// Player — Ida-inspired silhouette (sized to read clearly against tower)
function drawPlayer(pos, time) {
  const ground = world(pos.x + 0.5, pos.y, pos.z + 0.5);
  const bob = Math.sin(time * 0.004) * 1.8;
  const x = ground.sx;
  const baseY = ground.sy + 4 - bob;
  const pulse = 0.85 + 0.15 * Math.sin(time * 0.003);

  // Pulsing aura — keeps her visible at all times
  const auraR = 56 * pulse;
  const aura = ctx.createRadialGradient(ground.sx, ground.sy + 4, 0, ground.sx, ground.sy + 4, auraR);
  aura.addColorStop(0,   'rgba(255,228,180,0.30)');
  aura.addColorStop(0.5, 'rgba(255,228,180,0.10)');
  aura.addColorStop(1,   'rgba(255,228,180,0)');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(ground.sx, ground.sy + 4, auraR, 0, Math.PI*2); ctx.fill();

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.34)';
  ctx.beginPath();
  ctx.ellipse(ground.sx, ground.sy + 5, 18, 7.5, 0, 0, Math.PI*2);
  ctx.fill();

  // Cape/dress (tall, flowing — ~62px)
  ctx.fillStyle = '#fefdf6';
  ctx.beginPath();
  ctx.moveTo(x - 13, baseY);
  ctx.quadraticCurveTo(x - 9, baseY - 38, x - 6, baseY - 54);
  ctx.lineTo(x + 6, baseY - 54);
  ctx.quadraticCurveTo(x + 9, baseY - 38, x + 13, baseY);
  ctx.closePath();
  ctx.fill();

  // Right-side dress shading
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.moveTo(x + 1, baseY - 54);
  ctx.lineTo(x + 6, baseY - 54);
  ctx.quadraticCurveTo(x + 9, baseY - 38, x + 13, baseY);
  ctx.lineTo(x + 6, baseY);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle = '#fefdf6';
  ctx.beginPath();
  ctx.arc(x, baseY - 64, 9, 0, Math.PI*2);
  ctx.fill();

  // Pointed cap — Ida signature, much taller
  ctx.beginPath();
  ctx.moveTo(x - 9,  baseY - 68);
  ctx.lineTo(x,      baseY - 92);
  ctx.lineTo(x + 9,  baseY - 68);
  ctx.closePath();
  ctx.fill();

  // Cap right-side shading
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.beginPath();
  ctx.moveTo(x,      baseY - 92);
  ctx.lineTo(x + 9,  baseY - 68);
  ctx.lineTo(x,      baseY - 68);
  ctx.closePath();
  ctx.fill();

  // Tip highlight on cap
  ctx.fillStyle = 'rgba(255,228,180,0.85)';
  ctx.beginPath();
  ctx.arc(x, baseY - 92, 1.6, 0, Math.PI*2);
  ctx.fill();
}

// Background
function drawSky(t) {
  const grd = ctx.createLinearGradient(0, 0, 0, DH);
  for (let i = 0; i < SKY.length; i++) grd.addColorStop(i/(SKY.length-1), SKY[i]);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, DW, DH);

  // Stars (top portion)
  for (const s of STARS) {
    const x = s.x * DW, y = s.y * DH;
    s.tw += 0.018;
    const a = s.a * (0.6 + 0.4 * Math.sin(s.tw));
    ctx.fillStyle = `rgba(255,253,232,${a})`;
    ctx.fillRect(x, y, s.s, s.s);
  }

  // Distant moon
  const mx = DW * 0.78, my = DH * 0.18;
  const moon = ctx.createRadialGradient(mx, my, 0, mx, my, 220);
  moon.addColorStop(0, 'rgba(255,234,200,0.20)');
  moon.addColorStop(0.4, 'rgba(255,234,200,0.06)');
  moon.addColorStop(1, 'rgba(255,234,200,0)');
  ctx.fillStyle = moon;
  ctx.fillRect(0, 0, DW, DH);
  ctx.fillStyle = 'rgba(255,243,220,0.85)';
  ctx.beginPath(); ctx.arc(mx, my, 26, 0, Math.PI*2); ctx.fill();

  // Drifting dust
  for (const d of DUST) {
    d.x += d.v;
    if (d.x > 1.1) d.x = -0.1;
    const x = d.x * DW;
    const y = d.y * DH + Math.sin(t * 0.0008 + d.y * 6) * 8;
    ctx.fillStyle = `rgba(255,253,232,${d.a})`;
    ctx.beginPath(); ctx.arc(x, y, d.s, 0, Math.PI*2); ctx.fill();
  }
}

function drawGroundGlow() {
  const center = world(0.5, 0, 0.5);
  const grd = ctx.createRadialGradient(center.sx, center.sy + 60, 0, center.sx, center.sy + 60, 380);
  grd.addColorStop(0, 'rgba(232,169,140,0.22)');
  grd.addColorStop(0.5, 'rgba(232,169,140,0.06)');
  grd.addColorStop(1, 'rgba(232,169,140,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, DW, DH);
}

// ── Main loop ──
let last = performance.now();

function tick(now) {
  const dt = Math.min(40, now - last);
  last = now;

  // Center the tower by computing extreme corners in projection space
  const corners = [
    project(-1, 0, -1), project(3, 0, -1), project(-1, 0, 3), project(3, 0, 3),
    project(1, 5, -2), project(2, 2, 2), project(-1, 1, -1),
  ];
  const minSY = Math.min(...corners.map(p => p.sy));
  const maxSY = Math.max(...corners.map(p => p.sy));
  const minSX = Math.min(...corners.map(p => p.sx));
  const maxSX = Math.max(...corners.map(p => p.sx));
  // Mobile: more bottom margin for chrome
  const yShift = DW < 700 ? 0.50 : 0.55;
  originX = DW * 0.5 - (minSX + maxSX) * 0.5;
  originY = DH * yShift - (minSY + maxSY) * 0.5;

  // Movement interpolation
  if (interpFrom && interpT < 1) {
    interpT += dt / 600;
    if (interpT >= 1) {
      interpT = 1;
      pathIdx = targetIdx;
      const wp = PATH[pathIdx];
      if (wp.chapter !== undefined) showChapter(wp.chapter);
      interpFrom = null;
    }
  }

  // Render
  ctx.clearRect(0, 0, DW, DH);
  drawSky(now);
  drawGroundGlow();
  drawTower();
  drawPlayer(currentPos(), now);

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);
</script>

</body>
</html>
