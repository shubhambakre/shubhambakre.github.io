  pwd:     () => out(`<span class="muted">/home/shubham</span>`),
  date:    () => out(`<span class="muted">${new Date().toString()}</span>`),
  ls:      () => out(`<span class="accent">about.md</span>  <span class="accent">experience.md</span>  <span class="accent">projects/</span>  <span class="accent">skills.md</span>  <span class="accent">contact.md</span>  <span class="accent">resume.pdf</span>`),
  resume:  () => {
    out(`<span class="muted">Downloading <span class="amber">resume.pdf</span> ...</span>`);
    setTimeout(() => {
      const a = document.createElement('a');
      a.href = '/assets/resume.pdf'; a.download = 'shubham-bakre-resume.pdf';
      document.body.appendChild(a); a.click(); a.remove();
    }, 250);
  },
  clear:   () => { body.innerHTML = ''; },
  theme:   () => {
    themeIdx = (themeIdx + 1) % THEMES.length;
    applyTheme(themeIdx);
    const names = ['green','amber','blue','pink'];
    out(`<span class="muted">theme · </span><span class="accent">${names[themeIdx]}</span>`);
  },
  exit:    () => {
    out(`<span class="muted">closing terminal...</span>`);
    setTimeout(() => location.href = '/', 350);
  },
  cat: (arg) => {
    if (!arg) return out(`<span class="err">cat: missing operand</span>`);
    if (arg === 'about' || arg === 'about.md') return COMMANDS.about();
    if (arg === 'skills' || arg === 'skills.md') return COMMANDS.skills();
    if (arg === 'contact' || arg === 'contact.md') return COMMANDS.contact();
    if (PROJECT_DETAILS[arg])         return out(PROJECT_DETAILS[arg]);
    out(`<span class="err">cat: ${esc(arg)}: no such file</span> <span class="muted">— try one of:</span> ${
      Object.keys(PROJECT_DETAILS).map(k => `<span class="chip" data-cmd="cat ${k}">${k}</span>`).join('')
    }`);
  },
  open: (arg) => {
    const targets = {
      github:   'https://github.com/shubhambakre',
      linkedin: 'https://linkedin.com/in/shubhambakre',
      site:     'https://shubhambakre.com',
      portfolio:'https://shubhambakre.com',
      resume:   '/assets/resume.pdf',
      email:    'mailto:shubhambakre@gmail.com',
    };
    if (!arg || !targets[arg]) return out(`<span class="err">open: usage</span> <span class="muted">open &lt;github | linkedin | site | resume | email&gt;</span>`);
    out(`<span class="muted">opening <span class="amber">${arg}</span> ...</span>`);
    window.open(targets[arg], '_blank', 'noopener');
  },
  sudo: (arg, rest) => {
    if (arg === 'hire-me') {
      out(`<span class="muted">[sudo] password for shubham: </span><span class="amber">●●●●●●●</span>`);
      out(``);
      out(`<span class="accent">✓ access granted.</span>`);
      out(`<span class="muted">drafting introduction email...</span>`);
      setTimeout(() => {
        out(`<span class="accent">→ opening</span> <a class="link" href="mailto:shubhambakre@gmail.com?subject=Let%27s%20talk%20%E2%80%94%20Senior%20AI%20Engineering%20role&body=Hi%20Shubham%2C%0A%0AI%20came%20across%20your%20portfolio%20and...">your default mail client</a>`);
        location.href = "mailto:shubhambakre@gmail.com?subject=Let's talk — Senior AI Engineering role&body=Hi Shubham,%0A%0AI came across your portfolio and...";
      }, 500);
    } else {
      out(`<span class="err">sudo: ${esc(arg||'')}: command not found</span>`);
    }
  },
  echo: (...args) => out(`<span class="muted">${esc(args.join(' '))}</span>`),
  banner: () => printBanner(),
};

// Aliases
COMMANDS.ll = COMMANDS.ls;
COMMANDS.work = COMMANDS.experience;
COMMANDS.career = COMMANDS.experience;
COMMANDS.email = () => COMMANDS.open('email');
COMMANDS.linkedin = () => COMMANDS.open('linkedin');
COMMANDS.github = () => COMMANDS.open('github');

// ─── Boot sequence ───
function printBanner() {
  out(`<pre class="ascii">${ASCII}</pre>`);
  out(`<span class="muted">Welcome. You're inside an interactive resume.</span>`);
  out(`<span class="muted">Type <span class="chip" data-cmd="help">help</span> to see commands, or click any chip to run it.</span>`);
  blank();
}

// ─── Run a command ───
const history = [];
let histIdx = -1;

function run(rawCmd) {
  const cmd = (rawCmd || '').trim();
  echoCmd(cmd);
  if (!cmd) return;
  history.push(cmd); histIdx = history.length;
  const [name, ...args] = cmd.split(/\s+/);
  const fn = COMMANDS[name.toLowerCase()];
  if (!fn) {
    out(`<span class="err">command not found:</span> <span class="amber">${esc(name)}</span> <span class="muted">— try</span> <span class="chip" data-cmd="help">help</span>`);
    return;
  }
  try { fn(...args); } catch (e) { out(`<span class="err">${esc(String(e))}</span>`); }
}

// ─── Tab completion ───
function complete(prefix) {
  const cmds = Object.keys(COMMANDS);
  // Two-token complete: "cat g..." → cat go-llm-gateway
  const parts = prefix.split(/\s+/);
  if (parts.length === 2 && parts[0] === 'cat') {
    const opts = Object.keys(PROJECT_DETAILS).filter(k => k.startsWith(parts[1]));
    if (opts.length === 1) return 'cat ' + opts[0];
    return null;
  }
  if (parts.length === 2 && parts[0] === 'open') {
    const opts = ['github','linkedin','site','resume','email'].filter(k => k.startsWith(parts[1]));
    if (opts.length === 1) return 'open ' + opts[0];
    return null;
  }
  const opts = cmds.filter(c => c.startsWith(prefix));
  if (opts.length === 1) return opts[0];
  if (opts.length > 1) {
    out(`<span class="muted">${opts.map(o => `<span class="chip" data-cmd="${o}">${o}</span>`).join('')}</span>`);
  }
  return null;
}

// ─── Suggestions bar ───
const SUGGESTED = ['about','experience','projects','skills','contact','resume','sudo hire-me'];
function renderSuggestions() {
  sugBar.innerHTML = '';
  const lbl = document.createElement('span');
  lbl.className = 'lbl'; lbl.textContent = 'try';
  sugBar.appendChild(lbl);
  SUGGESTED.forEach(c => {
    const s = document.createElement('span');
    s.className = 'chip';
    s.dataset.cmd = c;
    s.textContent = c;
    sugBar.appendChild(s);
  });
}

// ─── Wiring ───
form.addEventListener('submit', (e) => {
  e.preventDefault();
  const v = input.value;
  input.value = '';
  run(v);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const c = complete(input.value.trim());
    if (c) input.value = c;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (history.length === 0) return;
    histIdx = Math.max(0, histIdx - 1);
    input.value = history[histIdx] || '';
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (history.length === 0) return;
    histIdx = Math.min(history.length, histIdx + 1);
    input.value = history[histIdx] || '';
  }
});

// Click-to-run chips (in suggestions or output)
document.addEventListener('click', (e) => {
  const chip = e.target.closest('.chip[data-cmd]');
  if (chip) {
    const cmd = chip.dataset.cmd;
    input.value = '';
    run(cmd);
    input.focus();
    return;
  }
  // Click anywhere in terminal body or input row → focus input
  if (e.target.closest('.term') && !e.target.closest('a') && !e.target.closest('input')) {
    input.focus();
  }
});

// Auto-focus on load (and keep focus)
window.addEventListener('load', () => input.focus());
input.addEventListener('blur', () => setTimeout(() => {
  if (document.activeElement.tagName !== 'A' && document.activeElement.tagName !== 'BUTTON') {
    input.focus();
  }
}, 50));

// Boot
applyTheme(0);
renderSuggestions();
printBanner();
</script>
