// ── Canvas ──────────────────────────────────────
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W,H;
const resize=()=>{ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; };
resize(); window.addEventListener('resize',()=>{ resize(); if(state==='play') buildLevel(); });

function setAc(c){ document.documentElement.style.setProperty('--ac',c); }
setAc(Z[0].ac);

// ── Physics ─────────────────────────────────────
const GV=0.60, JF=-13, MXF=17, SPD=6.5, FRIC=0.70;
const LW=1900, FX=1820;  // world width, flag x

// ── Input ───────────────────────────────────────
const K={},TC={left:0,right:0,jump:0};
window.addEventListener('keydown',e=>{
  K[e.code]=1;
  if(['Space','ArrowUp','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if(['Space','Enter','KeyE'].includes(e.code)) closeOv();
});
window.addEventListener('keyup',e=>K[e.code]=0);
document.querySelectorAll('.cb').forEach(b=>{
  const a=b.dataset.a;
  ['touchstart','mousedown'].forEach(ev=>b.addEventListener(ev,e=>{e.preventDefault();TC[a]=1;},{passive:false}));
  ['touchend','mouseup','mouseleave'].forEach(ev=>b.addEventListener(ev,()=>TC[a]=0));
});
const IN={get l(){return K.ArrowLeft||K.KeyA||TC.left;},get r(){return K.ArrowRight||K.KeyD||TC.right;},get j(){return K.ArrowUp||K.KeyW||K.Space||TC.jump;}};

// ── Overlay ─────────────────────────────────────
const ovEl=document.getElementById('ov'),ovTag=document.getElementById('ov-tag'),ovH=document.getElementById('ov-h'),ovB=document.getElementById('ov-b');
const pds=[0,1,2,3,4].map(i=>document.getElementById('p'+i));
let ovOn=false,ovIdx=-1,hintGone=false;

function openOv(i){
  if(ovOn&&ovIdx===i) return;
  const z=Z[i],c=CARDS[i];
  setAc(z.ac); ovTag.textContent=z.tag; ovH.textContent=c.title; ovB.innerHTML=c.body;
  pds.forEach((d,j)=>d.className='pd'+(j<i?' done':j===i?' now':''));
  ovEl.classList.add('on'); ovOn=true; ovIdx=i;
  if(pl) pl.frozen=true;
}
function closeOv(){
  if(!ovOn) return;
  ovEl.classList.remove('on'); ovOn=false;
  if(pl) pl.frozen=false;
}
document.getElementById('ov-btn').addEventListener('click',closeOv);
ovEl.addEventListener('click',e=>{ if(e.target===ovEl) closeOv(); });

// ── Helpers ─────────────────────────────────────
const lerp=(a,b,t)=>a+(b-a)*t;
function lerpHex(a,b,t){
  const h=s=>parseInt(s,16);
  return '#'+[[1,3],[3,5],[5,7]].map(([s,e])=>Math.round(lerp(h(a.slice(s,e)),h(b.slice(s,e)),t)).toString(16).padStart(2,'0')).join('');
}
function zoneCols(zt){
  const i=Math.min(Math.floor(zt),Z.length-2),f=zt-i;
  return { sky0:lerpHex(Z[i].sky0,Z[i+1].sky0,f), sky1:lerpHex(Z[i].sky1,Z[i+1].sky1,f), ac:lerpHex(Z[i].ac,Z[i+1].ac,f) };
}
function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ── Stars ───────────────────────────────────────
const STARS=Array.from({length:70},(_,i)=>({x:(i*197.3)%LW,y:Math.random()*.62,s:Math.random()<.2?1.5:1,p:.03+Math.random()*.08}));

// ── Background ──────────────────────────────────
function drawBG(cx,col,t){
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,col.sky0); g.addColorStop(1,col.sky1);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Stars
  for(const s of STARS){
    const sx=((s.x-cx*s.p)%W+W)%W;
    ctx.globalAlpha=.15+.1*Math.sin(t*.013+s.x*.02);
    ctx.fillStyle='#fff'; ctx.fillRect(sx,s.y*H,s.s,s.s);
  }
  ctx.globalAlpha=1;

  // Soft horizon glow matching accent
  const hg=ctx.createLinearGradient(0,H*.6,0,H);
  hg.addColorStop(0,col.ac+'00'); hg.addColorStop(1,col.ac+'12');
  ctx.fillStyle=hg; ctx.fillRect(0,H*.6,W,H*.4);
}

// ── Platform ─────────────────────────────────────
// Clean flat design: dark fill + accent glowing top edge
class Plat{
  constructor(x,y,w,h,type,label){
    this.x=x;this.y=y;this.w=w;this.h=h;this.type=type||'stone';this.label=label||'';
  }
  draw(cx,ac){
    const sx=this.x-cx; if(sx+this.w<-20||sx>W+20) return;
    const {y,w,h}=this,x=sx;

    // Body
    if(this.type==='ground'){
      ctx.fillStyle='rgba(255,255,255,0.04)';
      ctx.fillRect(x,y,w,h);
      // Subtle side edge
      ctx.strokeStyle='rgba(255,255,255,0.06)';
      ctx.lineWidth=1; ctx.strokeRect(x+.5,y+.5,w-1,h-1);
    } else {
      // Raised / accent platform
      const alpha=this.type==='company'?'20':'18';
      ctx.fillStyle='rgba(255,255,255,0.05)';
      ctx.fillRect(x,y,w,h);
      ctx.strokeStyle='rgba(255,255,255,0.08)';
      ctx.lineWidth=.5; ctx.strokeRect(x+.5,y+.5,w-1,h-1);
    }

    // Glowing top edge — the key detail
    const edgeGrad=ctx.createLinearGradient(x,y,x+w,y);
    if(this.type==='company'){
      edgeGrad.addColorStop(0,ac+'00');
      edgeGrad.addColorStop(.3,ac+'cc');
      edgeGrad.addColorStop(.7,ac+'cc');
      edgeGrad.addColorStop(1,ac+'00');
    } else {
      edgeGrad.addColorStop(0,'rgba(255,255,255,0)');
      edgeGrad.addColorStop(.5,'rgba(255,255,255,.22)');
      edgeGrad.addColorStop(1,'rgba(255,255,255,0)');
    }
    ctx.fillStyle=edgeGrad; ctx.fillRect(x,y,w,2);

    // Subtle glow bloom under top edge
    if(this.type==='company'||this.type==='accent'){
      const bloom=ctx.createLinearGradient(0,y,0,y+30);
      bloom.addColorStop(0,ac+'22'); bloom.addColorStop(1,ac+'00');
      ctx.fillStyle=bloom; ctx.fillRect(x,y,w,30);
    }

    // Label
    if(this.label){
      ctx.textAlign='center';
      ctx.fillStyle=ac+'99'; ctx.font='600 8px monospace';
      ctx.fillText(this.label.toUpperCase(),x+w/2,y-10);
    }
  }
}

// ── Skill orb ────────────────────────────────────
const SKILLS=['Go','Java','Python','GCP','Spark','BigQuery','Vertex AI','RAG','LangChain','Airflow'];
class Orb{
  constructor(x,y,label){
    this.x=x;this.y=y;this.label=label;
    this.t=Math.random()*Math.PI*2; this.collected=false; this.fly=0;
  }
  update(){this.t+=.04; if(this.fly>0)this.fly--;}
  draw(cx,ac){
    if(this.collected&&this.fly<=0) return;
    const sx=this.x-cx; if(sx<-40||sx>W+40) return;
    const bob=Math.sin(this.t)*4, sy=this.y+bob;
    if(this.collected){
      ctx.globalAlpha=this.fly/16; ctx.fillStyle=ac;
      ctx.beginPath(); ctx.arc(sx+11,sy-(16-this.fly)*2,6,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; return;
    }
    // Glow
    const gr=ctx.createRadialGradient(sx+11,sy+8,0,sx+11,sy+8,22);
    gr.addColorStop(0,ac+'88'); gr.addColorStop(.55,ac+'28'); gr.addColorStop(1,ac+'00');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(sx+11,sy+8,22,0,Math.PI*2); ctx.fill();
    // Core
    ctx.fillStyle=ac+'cc';
    ctx.beginPath(); ctx.arc(sx+11,sy+8,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.55)';
    ctx.beginPath(); ctx.arc(sx+8,sy+5,2.5,0,Math.PI*2); ctx.fill();
    // Label
    ctx.fillStyle='rgba(255,255,255,.62)'; ctx.font='700 8px monospace'; ctx.textAlign='center';
    ctx.fillText(this.label,sx+11,sy-7);
  }
  check(player){
    if(this.collected) return false;
    const dx=(player.x+player.w/2)-(this.x+11), dy=(player.y+player.h/2)-(this.y+8);
    if(dx*dx+dy*dy<36*36){this.collected=true;this.fly=16;return true;}
    return false;
  }
}

// ── Particle ─────────────────────────────────────
class Part{
  constructor(x,y,col){
    this.x=x;this.y=y;this.col=col;
    this.vx=(Math.random()-.5)*4; this.vy=-Math.random()*4-1;
    this.life=30;this.max=30;this.r=1+Math.random()*2;
  }
  update(){this.vy+=.22;this.x+=this.vx;this.y+=this.vy;this.life--;}
  draw(cx){
    ctx.globalAlpha=this.life/this.max; ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(this.x-cx,this.y,this.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ── Player ───────────────────────────────────────
class Player{
  constructor(x,y){
    this.x=x;this.y=y;this.w=18;this.h=32;
    this.vx=0;this.vy=0;this.onG=false;
    this.facing=1;this.wt=0;
    this.jb=0;this.coy=0;
    this.frozen=false;this.moved=false;
  }
  update(plats,orbs,parts,ac){
    if(!this.frozen){
      if(IN.l){this.vx=lerp(this.vx,-SPD,.3);this.facing=-1;this.moved=true;}
      else if(IN.r){this.vx=lerp(this.vx,SPD,.3);this.facing=1;this.moved=true;}
      else this.vx*=FRIC;
      if(IN.j) this.jb=10; else if(this.jb>0) this.jb--;
      if(this.onG) this.coy=10; else if(this.coy>0) this.coy--;
      if(this.jb>0&&this.coy>0){this.vy=JF;this.jb=0;this.coy=0;this.moved=true;}
      if(!IN.j&&this.vy<-3.5) this.vy+=2.2;
    } else {
      this.vx*=.78;
    }
    this.vy=Math.min(this.vy+GV,MXF);
    this.x+=this.vx; this.x=Math.max(0,Math.min(this.x,LW-this.w));
    this.y+=this.vy; this.onG=false;
    this._col(plats);
    if(this.onG&&Math.abs(this.vx)>.3) this.wt+=.2; else if(this.onG) this.wt=0;
    for(const o of orbs) if(o.check(this)) for(let i=0;i<5;i++) parts.push(new Part(o.x,o.y,ac));
  }
  _col(plats){
    for(const p of plats){
      if(!ov(this,p)) continue;
      if(this.vx>0){
        const step=p.y-(this.y+this.h);
        if(step>-22&&step<=0){this.y=p.y-this.h;this.onG=true;}
        else{this.x=p.x-this.w;this.vx=0;}
      } else if(this.vx<0){this.x=p.x+p.w;this.vx=0;}
    }
    for(const p of plats){
      if(!ov(this,p)) continue;
      if(this.vy>=0){this.y=p.y-this.h;this.vy=0;this.onG=true;}
      else{this.y=p.y+p.h;this.vy=.5;}
    }
  }
  draw(cx,ac){
    const sx=Math.round(this.x-cx), sy=Math.round(this.y);
    const leg=Math.sin(this.wt)*5;

    // Glow
    const gr=ctx.createRadialGradient(sx+9,sy+16,0,sx+9,sy+16,24);
    gr.addColorStop(0,ac+'20'); gr.addColorStop(1,ac+'00');
    ctx.fillStyle=gr; ctx.fillRect(sx-15,sy-8,48,50);

    // Shadow
    ctx.fillStyle='rgba(0,0,0,.22)';
    ctx.beginPath(); ctx.ellipse(sx+9,sy+this.h+2,8,3,0,0,Math.PI*2); ctx.fill();

    ctx.save();
    if(this.facing===-1){ctx.translate(sx+9,0);ctx.scale(-1,1);ctx.translate(-(sx+9),0);}

    // Legs
    ctx.fillStyle='rgba(255,255,255,.42)';
    ctx.fillRect(sx+1+leg*.3, sy+22,6,11);
    ctx.fillRect(sx+11-leg*.3,sy+22,6,11);
    // Body
    ctx.fillStyle='rgba(255,255,255,.86)'; ctx.fillRect(sx+1,sy+10,16,14);
    // Arms
    ctx.fillStyle='rgba(255,255,255,.42)';
    ctx.fillRect(sx-4,sy+12-leg*.2,5,9); ctx.fillRect(sx+17,sy+12+leg*.2,5,9);
    // Head
    ctx.fillStyle='rgba(255,255,255,.92)';
    ctx.beginPath(); ctx.arc(sx+9,sy+6,7,0,Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.beginPath(); ctx.arc(sx+12,sy+5.5,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.75)'; ctx.beginPath(); ctx.arc(sx+13,sy+5,0.9,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }
}

// ── Flag ─────────────────────────────────────────
function drawFlag(cx,gY,t,ac){
  const sx=FX-cx; if(sx<-60||sx>W+60) return;
  // Pole with glow
  ctx.shadowColor=ac; ctx.shadowBlur=10;
  ctx.strokeStyle='rgba(255,255,255,.30)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx,gY); ctx.lineTo(sx,gY-140); ctx.stroke();
  ctx.shadowBlur=0;
  // Waving pennant
  const w=Math.sin(t*.05)*5;
  ctx.fillStyle=ac+'cc';
  ctx.beginPath();
  ctx.moveTo(sx,gY-140);
  ctx.quadraticCurveTo(sx+28,gY-131+w,sx+50,gY-124);
  ctx.quadraticCurveTo(sx+28,gY-116+w,sx,gY-108);
  ctx.closePath(); ctx.fill();
}

// ── Title ────────────────────────────────────────
function drawTitle(t){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,Z[0].sky0); g.addColorStop(1,Z[0].sky1);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  for(const s of STARS){
    ctx.globalAlpha=.14+.1*Math.sin(t*.012+s.x*.02);
    ctx.fillStyle='#fff'; ctx.fillRect(s.x%W,s.y*H,s.s,s.s);
  }
  ctx.globalAlpha=1;

  ctx.textAlign='center';

  // Subtle horizontal rule above name
  ctx.fillStyle='rgba(255,255,255,.07)';
  ctx.fillRect(W/2-80,H*.40-1,160,1);

  // Name
  ctx.shadowColor=Z[0].ac; ctx.shadowBlur=60;
  ctx.fillStyle='rgba(255,255,255,.94)';
  ctx.font=`300 ${Math.min(46,W*.064)}px 'Segoe UI',system-ui`;
  ctx.fillText('SHUBHAM BAKRE',W/2,H*.44);
  ctx.shadowBlur=0;

  // Role
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.font=`${Math.min(10,W*.014)}px 'Segoe UI',system-ui`;
  ctx.fillText('SENIOR  SOFTWARE  ENGINEER  ·  AI',W/2,H*.44+32);

  // Horizontal rule below
  ctx.fillStyle='rgba(255,255,255,.07)';
  ctx.fillRect(W/2-80,H*.44+46,160,1);

  // Blink prompt
  if(Math.floor(t/30)%2===0){
    ctx.fillStyle=Z[0].ac+'bb';
    ctx.font=`${Math.min(10,W*.014)}px 'Segoe UI',system-ui`;
    ctx.fillText(W<600?'TAP  TO  ENTER':'PRESS  SPACE  TO  ENTER',W/2,H*.63);
  }
}

// ── Level ─────────────────────────────────────────
let plats,orbs,parts,pl,gY;
const TRIGGERS=[{x:50,i:0,done:0},{x:415,i:1,done:0},{x:815,i:2,done:0},{x:1215,i:3,done:0}];
let flagDone=0;

function buildLevel(){
  gY=H-90; plats=[]; orbs=[];

  // Ground — 4 gaps of 65px
  [[0,330],[395,730],[795,1130],[1195,1530],[1595,LW]].forEach(([a,b])=>{
    plats.push(new Plat(a,gY,b-a,80,'ground'));
  });

  // Zone 0: About — gentle stepping platforms
  plats.push(new Plat(150,gY-70, 100,70,'accent'));
  plats.push(new Plat(270,gY-110, 80,110,'accent'));

  // Zone 1: Projects
  plats.push(new Plat(435,gY-60, 150,60,'accent'));
  plats.push(new Plat(620,gY-95, 100,95,'stone'));
  plats.push(new Plat(725,gY-55,  80,55,'stone'));

  // Zone 2: Experience — company labelled platforms, staircase
  [[820,80,'Walmart'],[958,60,'Choice Hotels'],[1075,90,'Zelle'],[1162,65,'Amex']].forEach(([x,ht,l])=>{
    plats.push(new Plat(x,gY-ht,l==='Choice Hotels'?120:l==='Walmart'?140:90,ht,'company',l));
  });

  // Zone 3: Skills — orbs over accent platforms
  plats.push(new Plat(1220,gY-70,130,70,'accent'));
  plats.push(new Plat(1368,gY-100,105,100,'stone'));
  plats.push(new Plat(1470,gY-60, 90, 60,'stone'));
  SKILLS.forEach((label,i)=>{
    const x=1210+i*33, y=gY-128-Math.abs(Math.sin(i*.72))*52;
    orbs.push(new Orb(x,y,label));
  });

  // Zone 4: Contact
  plats.push(new Plat(1628,gY-70,160,70,'accent'));
  plats.push(new Plat(1730,gY-105,120,105,'accent'));
}

// ── Main loop ─────────────────────────────────────
let state='title', tick=0, camX=0, zt=0, flagTriggered=0;

function loop(){
  tick++;

  if(state==='title'){
    drawTitle(tick);
    if(IN.j||IN.r){
      state='play'; buildLevel();
      parts=[]; camX=0; zt=0; flagTriggered=0;
      TRIGGERS.forEach(t=>t.done=0); flagDone=0;
      pl=new Player(80,gY-60);
      setTimeout(()=>openOv(0),700);
    }
    requestAnimationFrame(loop); return;
  }

  // Zone colour
  const tZone=Math.min(camX/(LW/Z.length),Z.length-1.001);
  zt+=(tZone-zt)*.06;
  const col=zoneCols(Math.max(0,zt));
  setAc(col.ac);

  // Update
  pl.update(plats,orbs,parts,col.ac);
  orbs.forEach(o=>o.update());
  parts=parts.filter(p=>{p.update();return p.life>0;});

  if(pl.moved&&!hintGone){hintGone=true;document.getElementById('hint').style.opacity='0';}

  for(const tr of TRIGGERS) if(!tr.done&&pl.x>tr.x){tr.done=1;openOv(tr.i);}
  if(!flagTriggered&&pl.x>FX-55){flagTriggered=1;openOv(4);}

  // Camera
  camX=lerp(camX,pl.x-W*.36,.09);
  camX=Math.max(0,Math.min(camX,LW-W));

  // Respawn
  if(pl.y>H+80){pl.y=gY-60;pl.vy=0;pl.x=Math.max(60,pl.x-80);}

  // Render
  ctx.clearRect(0,0,W,H);
  drawBG(camX,col,tick);
  plats.forEach(p=>p.draw(camX,col.ac));
  orbs.forEach(o=>o.draw(camX,col.ac));
  parts.forEach(p=>p.draw(camX));
  drawFlag(camX,gY,tick,col.ac);
  pl.draw(camX,col.ac);

  requestAnimationFrame(loop);
}

// Kick off
plats=[]; orbs=[]; parts=[]; gY=H-90;
pl=new Player(80,gY-60);
loop();
</script>
