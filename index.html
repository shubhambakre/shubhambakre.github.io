// ── Canvas & resize ──────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

function setAccent(col) { document.documentElement.style.setProperty('--ac', col); }

// ── Physics constants ────────────────────────────────────
const GV=0.58, JF=-13.5, MXF=17, SPD=6.5, FRIC=0.72;
const LW=1900, FLAG_X=1800;

// ── Input ────────────────────────────────────────────────
const K={}, TC={left:false,right:false,jump:false};
window.addEventListener('keydown',e=>{
  K[e.code]=true;
  if(['Space','ArrowUp','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();

  b.addEventListener('mousedown', ()=>TC[a]=true);

const IN={
  get left(){  return K.ArrowLeft ||K.KeyA||TC.left;  },

// ── Overlay system ────────────────────────────────────────
const overlayEl   = document.getElementById('overlay');
const ovLabel     = document.getElementById('ov-label');

function showOverlay(idx) {

// ── Colour helpers ────────────────────────────────────────
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpHex(c1,c2,t){
  const p=s=>parseInt(s,16);
  const r1=p(c1.slice(1,3)),g1=p(c1.slice(3,5)),b1=p(c1.slice(5,7));
  const r2=p(c2.slice(1,3)),g2=p(c2.slice(3,5)),b2=p(c2.slice(5,7));
  return '#'+[lerp(r1,r2,t),lerp(g1,g2,t),lerp(b1,b2,t)]
    .map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
}
function zoneColors(zt) {
  const i=Math.min(Math.floor(zt),ZONES.length-2), f=zt-i;
  return {
    bg0:    lerpHex(ZONES[i].bg0,   ZONES[i+1].bg0,   f),
    bg1:    lerpHex(ZONES[i].bg1,   ZONES[i+1].bg1,   f),
    accent: lerpHex(ZONES[i].accent, ZONES[i+1].accent, f),
  };
}

// ── Stars & background shapes ──────────────────────────────
const STARS = Array.from({length:55},(_,i)=>({
  x: (i*193.7)%LW, y: Math.random()*.6,
  s: Math.random()<.18?1.5:1, p: .04+Math.random()*.10,
}));
const PILLARS=[
  {x:320,h:280,w:2,p:.05},{x:680,h:340,w:2,p:.04},{x:1050,h:260,w:2,p:.06},
  {x:1380,h:310,w:2,p:.045},{x:1700,h:290,w:2,p:.05},
  {x:500,h:420,w:28,p:.07},{x:950,h:380,w:22,p:.06},{x:1250,h:440,w:26,p:.05},
];

function drawBG(cx,col,t){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,col.bg0); g.addColorStop(1,col.bg1);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Stars
  for(const s of STARS){
    const sx=((s.x-cx*s.p)%W+W)%W;
    const a=.18+.14*Math.sin(t*.012+s.x*.01);
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.fillRect(sx,s.y*H,s.s,s.s);
  }

  // Background architectural pillars
  ctx.save();
  for(const p of PILLARS){
    const sx=((p.x-cx*p.p)%(W+120)+W+120)%(W+120)-60;
    if(p.w<8){
      // Thin line
      ctx.strokeStyle='rgba(255,255,255,0.035)';
      ctx.lineWidth=p.w;
      ctx.beginPath(); ctx.moveTo(sx,H*.08); ctx.lineTo(sx,H*.08+p.h); ctx.stroke();
    } else {
      // Tower block
      ctx.fillStyle='rgba(255,255,255,0.018)';
      ctx.fillRect(sx,H*.05,p.w,p.h);
      // Battlements
      ctx.fillStyle='rgba(255,255,255,0.018)';
      for(let b=0;b<3;b++) ctx.fillRect(sx+b*(p.w/3+1),H*.05-12,p.w/3-1,12);
    }
  }
  ctx.restore();

  // Vanishing-point floor grid (Monument Valley feel)
  const gy=H*.84;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.022)'; ctx.lineWidth=.6;
  for(let i=0;i<=14;i++){
    const gx=(i/14)*W;
    ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(W/2+(gx-W/2)*.06,H); ctx.stroke();
  }
  for(let j=0;j<=5;j++){
    const fy=gy+j*(H-gy)/5;
    const spread=(fy-gy)/(H-gy);
    const x0=W/2-(W/2)*spread, x1=W/2+(W/2)*spread;
    ctx.beginPath(); ctx.moveTo(x0,fy); ctx.lineTo(x1,fy); ctx.stroke();
  }
  ctx.restore();
}

// ── Isometric platform ────────────────────────────────────
class IsoPlatform {
  constructor(x,y,w,h,d,type,label){
    this.x=x; this.y=y; this.w=w; this.h=h; this.d=d||20;
    this.type=type||'stone'; this.label=label||'';
  }
  draw(cx,accent){
    const sx=this.x-cx;
    if(sx+this.w+this.d<-40||sx>W+40) return;
    const {x:_,y,w,h,d}=this, x=sx;
    let top,front,right,edge,lc;
    if(this.type==='ground'){
      top='rgba(255,255,255,0.055)'; front='rgba(255,255,255,0.022)';
      right='rgba(0,0,0,0.28)'; edge='rgba(255,255,255,0.08)'; lc=null;
    } else if(this.type==='accent'){
      top=accent+'22'; front=accent+'0f'; right='rgba(0,0,0,0.30)';
      edge=accent+'55'; lc=null;
    } else { // company
      top=accent+'1a'; front=accent+'0d'; right='rgba(0,0,0,0.32)';
      edge=accent+'66'; lc=this.label;
    }
    // top face
    ctx.beginPath();
    ctx.moveTo(x,y); ctx.lineTo(x+w,y);
    ctx.lineTo(x+w+d,y-d*.5); ctx.lineTo(x+d,y-d*.5);
    ctx.closePath(); ctx.fillStyle=top; ctx.fill();
    // front face
    ctx.beginPath();
    ctx.moveTo(x,y); ctx.lineTo(x,y+h);
    ctx.lineTo(x+w,y+h); ctx.lineTo(x+w,y);
    ctx.closePath(); ctx.fillStyle=front; ctx.fill();
    // right face
    ctx.beginPath();
    ctx.moveTo(x+w,y); ctx.lineTo(x+w+d,y-d*.5);
    ctx.lineTo(x+w+d,y+h-d*.5); ctx.lineTo(x+w,y+h);
    ctx.closePath(); ctx.fillStyle=right; ctx.fill();
    // edges
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=.5;
    ctx.strokeRect(x,y,w,h);
    ctx.beginPath(); ctx.moveTo(x,y);
    ctx.lineTo(x+d,y-d*.5); ctx.lineTo(x+w+d,y-d*.5); ctx.lineTo(x+w,y);
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.stroke();
    // accent top edge
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w,y);
    ctx.strokeStyle=edge; ctx.lineWidth=1; ctx.stroke();
    // label
    if(lc){
      ctx.fillStyle=accent+'bb'; ctx.font='bold 8px monospace';
      ctx.textAlign='center';
      ctx.fillText(lc.toUpperCase(),x+w/2,y-d*.5-7);
    }
  }
}

// ── Floating skill orb ─────────────────────────────────────
const SKILL_LABELS=['Go','Java','Python','GCP','Spark','BigQuery','Vertex AI','RAG','LangChain','Airflow'];
class Orb {
  constructor(x,y,label){
    this.x=x; this.y=y; this.label=label;
    this.t=Math.random()*Math.PI*2;
    this.collected=false; this.fly=0;
  }
  update(){ this.t+=.038; if(this.fly>0)this.fly--; }
  draw(cx,accent){
    if(this.collected&&this.fly<=0) return;
    const sx=this.x-cx;
    if(sx<-30||sx>W+30) return;
    const bob=Math.sin(this.t)*4;
    const sy=this.y+bob;
    if(this.collected){
      ctx.globalAlpha=this.fly/18;
      ctx.fillStyle=accent;
      ctx.beginPath(); ctx.arc(sx+12,sy-(18-this.fly)*1.5,7,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; return;
    }
    // glow
    const gr=ctx.createRadialGradient(sx+12,sy+8,0,sx+12,sy+8,20);
    gr.addColorStop(0,accent+'99'); gr.addColorStop(.6,accent+'33'); gr.addColorStop(1,accent+'00');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.arc(sx+12,sy+8,20,0,Math.PI*2); ctx.fill();
    // core
    ctx.fillStyle=accent+'bb';
    ctx.beginPath(); ctx.arc(sx+12,sy+8,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(sx+9,sy+5,2.5,0,Math.PI*2); ctx.fill();
    // label
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.font='700 8px monospace'; ctx.textAlign='center';
    ctx.fillText(this.label,sx+12,sy-6);
  }
  checkCollect(player){
    if(this.collected) return false;
    const dx=(player.x+player.w*.5)-(this.x+12);
    const dy=(player.y+player.h*.5)-(this.y+8);
    if(Math.sqrt(dx*dx+dy*dy)<34){ this.collected=true; this.fly=18; return true; }
    return false;
  }
}

// ── Particle ──────────────────────────────────────────────
class Particle {
  constructor(x,y,col){
    this.x=x; this.y=y; this.col=col;
    this.vx=(Math.random()-.5)*4.5; this.vy=Math.random()*-4-1;
    this.life=32; this.max=32; this.r=1+Math.random()*2.5;
  }
  update(){ this.vy+=.22; this.x+=this.vx; this.y+=this.vy; this.life--; }
  draw(cx){
    ctx.globalAlpha=this.life/this.max;
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(this.x-cx,this.y,this.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ── Player ────────────────────────────────────────────────
function ov(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }

class Player {
  constructor(x,y){
    this.x=x; this.y=y; this.w=18; this.h=34;
    this.vx=0; this.vy=0; this.onGround=false;
    this.facing=1; this.walkT=0;
    this.jBuf=0; this.coyote=0;
    this.frozen=false; this.moved=false;
  }
  update(plats,orbs,parts,accent){
    if(!this.frozen){
      if(IN.left){  this.vx=lerp(this.vx,-SPD,.32); this.facing=-1; this.moved=true; }
      else if(IN.right){ this.vx=lerp(this.vx, SPD,.32); this.facing= 1; this.moved=true; }
      else this.vx*=FRIC;
      if(IN.jump) this.jBuf=10; else if(this.jBuf>0) this.jBuf--;
      if(this.onGround) this.coyote=10; else if(this.coyote>0) this.coyote--;
      if(this.jBuf>0&&this.coyote>0){ this.vy=JF; this.jBuf=0; this.coyote=0; this.moved=true; }
      if(!IN.jump&&this.vy<-3.5) this.vy+=2.2;
    } else {
      this.vx*=.80;
    }
    this.vy=Math.min(this.vy+GV,MXF);
    this.x+=this.vx;
    this.x=Math.max(0,Math.min(this.x,LW-this.w));
    this.y+=this.vy;
    this.onGround=false;
    this._collide(plats);
    if(this.onGround&&Math.abs(this.vx)>.3) this.walkT+=.20; else if(this.onGround) this.walkT=0;
    for(const o of orbs){
      if(o.checkCollect(this)) for(let i=0;i<5;i++) parts.push(new Particle(o.x,o.y,accent));
    }
  }
  _collide(plats){
    // X axis
    for(const p of plats){
      if(!ov(this,p)) continue;
      if(this.vx>0){
        const ledge=p.y-(this.y+this.h);
        if(ledge>-22&&ledge<=0){ this.y=p.y-this.h; this.onGround=true; }
        else { this.x=p.x-this.w; this.vx=0; }
      } else if(this.vx<0){
        this.x=p.x+p.w; this.vx=0;
      }
    }
    // Y axis
    for(const p of plats){
      if(!ov(this,p)) continue;
      if(this.vy>=0){ this.y=p.y-this.h; this.vy=0; this.onGround=true; }
      else           { this.y=p.y+p.h;   this.vy=.5; }
    }
  }
  draw(cx,accent){
    const sx=Math.round(this.x-cx), sy=Math.round(this.y);
    const leg=Math.sin(this.walkT)*5;
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(sx+9,sy+this.h+2,8,3,0,0,Math.PI*2); ctx.fill();
    // subtle glow
    const gr=ctx.createRadialGradient(sx+9,sy+17,0,sx+9,sy+17,26);
    gr.addColorStop(0,accent+'16'); gr.addColorStop(1,accent+'00');
    ctx.fillStyle=gr; ctx.fillRect(sx-17,sy-8,52,52);
    ctx.save();
    if(this.facing===-1){ ctx.translate(sx+9,0); ctx.scale(-1,1); ctx.translate(-(sx+9),0); }
    // legs
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.fillRect(sx+2+leg*.28,  sy+22, 6, 12);
    ctx.fillRect(sx+10-leg*.28, sy+22, 6, 12);
    // body
    ctx.fillStyle='rgba(255,255,255,0.82)';
    ctx.fillRect(sx+1,sy+10,16,14);
    // arms
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.fillRect(sx-4, sy+12-leg*.18, 6, 10);
    ctx.fillRect(sx+16,sy+12+leg*.18, 6, 10);
    // head
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.beginPath(); ctx.arc(sx+9,sy+6,7,0,Math.PI*2); ctx.fill();
    // eye
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.beginPath(); ctx.arc(sx+12,sy+5.5,2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(sx+13,sy+4.8,0.9,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Flag ──────────────────────────────────────────────────
function drawFlag(cx,gY,t,accent){
  const sx=FLAG_X-cx;
  if(sx<-60||sx>W+60) return;
  ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(sx,gY); ctx.lineTo(sx,gY-160); ctx.stroke();
  const w=Math.sin(t*.048)*5;
  ctx.fillStyle=accent+'cc';
  ctx.beginPath();
  ctx.moveTo(sx,gY-160);
  ctx.quadraticCurveTo(sx+30,gY-150+w,sx+55,gY-142);
  ctx.quadraticCurveTo(sx+30,gY-133+w,sx,gY-124);
  ctx.closePath(); ctx.fill();
}

// ── Title screen ──────────────────────────────────────────
function drawTitle(t){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,ZONES[0].bg0); g.addColorStop(1,ZONES[0].bg1);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(const s of STARS){
    ctx.fillStyle=`rgba(255,255,255,${.15+.12*Math.sin(t*.01+s.x*.01)})`;
    ctx.fillRect(s.x%W,s.y*H,s.s,s.s);
  }
  // Thin architectural lines
  ctx.strokeStyle='rgba(255,255,255,0.035)'; ctx.lineWidth=1;
  for(let i=0;i<6;i++){
    ctx.beginPath(); ctx.moveTo(W*.08+i*(W*.17),H*.06); ctx.lineTo(W*.08+i*(W*.17),H*.65); ctx.stroke();
  }
  ctx.textAlign='center';
  // Name
  ctx.shadowColor=ZONES[0].accent; ctx.shadowBlur=50;
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.font=`300 ${Math.min(48,W*.068)}px 'Segoe UI',system-ui`;
  ctx.fillText('SHUBHAM  BAKRE',W/2,H*.44);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.font=`${Math.min(11,W*.016)}px 'Segoe UI',system-ui`;
  ctx.fillText('SENIOR  SOFTWARE  ENGINEER  ·  AI',W/2,H*.44+34);
  // Prompt blink
  if(Math.floor(t/32)%2===0){
    ctx.fillStyle=ZONES[0].accent+'cc';
    ctx.font=`${Math.min(10,W*.015)}px 'Segoe UI',system-ui`;
    ctx.fillText(W<600?'TAP TO ENTER':'PRESS  SPACE  TO  ENTER',W/2,H*.64);
  }
}

// ── Level builder ──────────────────────────────────────────
let plats, orbs, parts, player, gY;
const TRIGGERS=[
  {x:50,  idx:0, done:false},
  {x:415, idx:1, done:false},
  {x:815, idx:2, done:false},
  {x:1215,idx:3, done:false},
];
let flagDone=false;

function initLevel(){
  gY=H-96;
  plats=[]; orbs=[];
  // Ground sections — 4 gaps of 65px
  [[0,330],[395,730],[795,1130],[1195,1530],[1595,LW]].forEach(([a,b])=>{
    plats.push(new IsoPlatform(a,gY,b-a,80,22,'ground'));
  });
  // Zone 0: About
  plats.push(new IsoPlatform(140,gY-85, 90,85,18,'accent'));
  plats.push(new IsoPlatform(255,gY-120,80,120,18,'stone'));
  // Zone 1: Projects
  plats.push(new IsoPlatform(430,gY-65,150,65,18,'accent'));
  plats.push(new IsoPlatform(615,gY-100,110,100,18,'stone'));
  plats.push(new IsoPlatform(720,gY-55, 80, 55,18,'stone'));
  // Zone 2: Experience — company labelled platforms
  [[820,gY-80,130,'Walmart'],[955,gY-60,115,'Choice Hotels'],
   [1072,gY-95,90,'Zelle'],[1162,gY-65,80,'Amex']].forEach(([x,y,w,l])=>{
    plats.push(new IsoPlatform(x,y,w,Math.abs(y-gY),18,'company',l));
  });
  // Zone 3: Skills — orbs + accent platforms
  plats.push(new IsoPlatform(1220,gY-75,120,75,18,'accent'));
  plats.push(new IsoPlatform(1358,gY-105,105,105,18,'stone'));
  plats.push(new IsoPlatform(1463,gY-65, 90, 65,18,'stone'));
  SKILL_LABELS.forEach((label,i)=>{
    orbs.push(new Orb(1208+i*33, gY-130-Math.abs(Math.sin(i*.72))*55, label));
  });
  // Zone 4: Contact
  plats.push(new IsoPlatform(1628,gY-75,160,75,18,'accent'));
  plats.push(new IsoPlatform(1728,gY-110,120,110,18,'accent'));
}

// ── Main loop ──────────────────────────────────────────────
let state='title', tick=0, camX=0, zoneT=0, triggeredFlag=false;

function loop(){
  tick++;
  if(state==='title'){
    drawTitle(tick);
    if(IN.jump||IN.right){ state='play'; initLevel(); parts=[]; camX=0; zoneT=0; triggeredFlag=false; TRIGGERS.forEach(t=>t.done=false); flagDone=false; setTimeout(()=>showOverlay(0),700); }
    requestAnimationFrame(loop); return;
  }

  // Zone colour progress
  const zw=LW/ZONES.length;
  const tz=Math.min(camX/zw, ZONES.length-1.001);
  zoneT+=(tz-zoneT)*.06;
  const col=zoneColors(Math.max(0,zoneT));
  setAccent(col.accent);

  // Update
  player.update(plats,orbs,parts,col.accent);
  orbs.forEach(o=>o.update());
  parts=parts.filter(p=>{ p.update(); return p.life>0; });
  if(player.moved) dismissHint();

  // Zone triggers
  for(const tr of TRIGGERS){
    if(!tr.done&&player.x>tr.x){ tr.done=true; showOverlay(tr.idx); }
  }
  if(!triggeredFlag&&player.x>FLAG_X-55){ triggeredFlag=true; showOverlay(4); }

  // Camera
  const tc=player.x-W*.36;
  camX+=(tc-camX)*.092;
  camX=Math.max(0,Math.min(camX,LW-W));

  // Respawn
  if(player.y>H+80){ player.y=gY-60; player.vy=0; player.x=Math.max(60,player.x-80); }

  // Render
  ctx.clearRect(0,0,W,H);
  drawBG(camX,col,tick);
  plats.forEach(p=>p.draw(camX,col.accent));
  orbs.forEach(o=>o.draw(camX,col.accent));
  parts.forEach(p=>p.draw(camX));
  drawFlag(camX,gY,tick,col.accent);
  player.draw(camX,col.accent);

  // Zone ambient text
  ctx.textAlign='center'; ctx.font=`bold ${Math.min(56,W*.072)}px monospace`;
  const zLabels=[{x:165,'n':'About'},{x:562,'n':'Projects'},{x:962,'n':'Experience'},{x:1362,'n':'Skills'},{x:1700,'n':'Connect'}];
  for(const z of zLabels){
    const sx=z.x-camX;
    if(sx<-120||sx>W+120) continue;
    ctx.fillStyle='rgba(255,255,255,0.05)';
    ctx.fillText(z.n,sx,gY-18);
  }

  requestAnimationFrame(loop);
}

// Init player once so it exists before first overlay
plats=[]; orbs=[]; parts=[]; gY=H-96;
player=new Player(80,gY-60);
loop();
</script>
