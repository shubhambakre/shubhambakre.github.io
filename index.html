let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function beep(f,t,d,v=0.2,slide=0){
  const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=t;o.frequency.value=f;
  if(slide)o.frequency.linearRampToValueAtTime(slide,ac.currentTime+d);
  g.gain.setValueAtTime(v,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
  o.start();o.stop(ac.currentTime+d);
}
const SFX={jump(){beep(350,'square',0.1,0.25,600);},collect(){beep(700,'sine',0.08,0.2);setTimeout(()=>beep(1050,'sine',0.1,0.15),70);},reveal(){beep(440,'sine',0.15,0.3);beep(660,'sine',0.15,0.25);beep(880,'sine',0.2,0.2);}};

class Platform{
  constructor(x,y,w,h,type='ground',label=''){this.x=x;this.y=y;this.w=w;this.h=h;this.type=type;this.label=label;}
  draw(ctx,cx,W){
    const sx=this.x-cx; if(sx+this.w<0||sx>W) return;
    if(this.type==='ground'){
      ctx.fillStyle='#3a7a28';ctx.fillRect(sx,this.y,this.w,9);
      ctx.fillStyle='#7a5020';ctx.fillRect(sx,this.y+9,this.w,this.h-9);
      ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(sx,this.y+9,this.w,2);
    } else if(this.type==='brick'){
      ctx.fillStyle='#8B4513';ctx.fillRect(sx,this.y,this.w,this.h);
      ctx.fillStyle='#6B3410';
      ctx.fillRect(sx,this.y,this.w,3);ctx.fillRect(sx,this.y+this.h-3,this.w,3);
      for(let i=0;i<Math.ceil(this.w/TILE);i++){
        ctx.fillRect(sx+i*TILE,this.y,2,this.h);
      }
    } else if(this.type==='cloud'){
      ctx.fillStyle='rgba(180,200,255,0.15)';ctx.fillRect(sx,this.y,this.w,this.h);
      ctx.fillStyle='rgba(200,220,255,0.3)';ctx.fillRect(sx+2,this.y+2,this.w-4,this.h-6);
      ctx.strokeStyle='rgba(140,170,255,0.4)';ctx.lineWidth=1;ctx.strokeRect(sx,this.y,this.w,this.h);
    } else if(this.type==='company'){
      // Glowing platform
      const grd=ctx.createLinearGradient(sx,this.y,sx,this.y+this.h);
      grd.addColorStop(0,'rgba(129,140,248,0.5)');grd.addColorStop(1,'rgba(99,102,241,0.2)');
      ctx.fillStyle=grd;ctx.fillRect(sx,this.y,this.w,this.h);
      ctx.fillStyle='rgba(129,140,248,0.6)';ctx.fillRect(sx,this.y,this.w,2);
      if(this.label){
        ctx.fillStyle='rgba(129,140,248,0.9)';
        ctx.font=`bold 11px monospace`;ctx.textAlign='center';
        ctx.fillText(this.label,sx+this.w/2,this.y-8);
      }
    }
  }
}

class QBlock{
  constructor(x,y,cardIdx){this.x=x;this.y=y;this.w=TILE;this.h=TILE;this.cardIdx=cardIdx;this.hit=false;this.bump=0;this.t=0;}
  draw(ctx,cx){
    this.t++;
    const sx=this.x-cx;
    const by=this.y-Math.abs(Math.sin(this.bump*0.3))*8;this.bump=Math.max(0,this.bump-1);
    if(this.hit){
      ctx.fillStyle='#555'; ctx.fillRect(sx,by,this.w,this.h);
      ctx.fillStyle='#444'; ctx.fillRect(sx+2,by+2,this.w-4,this.h-4);
      return;
    }
    // Glow
    ctx.shadowColor='rgba(255,200,0,0.6)';ctx.shadowBlur=14+Math.sin(this.t*0.08)*6;
    ctx.fillStyle='#C87800';ctx.fillRect(sx,by,this.w,this.h);
    ctx.fillStyle='#FFAA00';ctx.fillRect(sx+2,by+2,this.w-4,this.h-4);
    ctx.fillStyle='#FFD000';ctx.fillRect(sx+4,by+4,this.w-8,this.h-8);
    ctx.shadowBlur=0;
    // ?
    ctx.fillStyle='#fff';ctx.font=`bold 20px monospace`;ctx.textAlign='center';
    ctx.fillText('?',sx+this.w/2,by+this.h-10);
    // Shine
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillRect(sx+4,by+4,8,8);
  }
  checkHit(player){
    if(this.hit) return false;
    // Trigger by proximity — just walk near the block
    const cx=this.x+this.w/2, pcx=player.x+player.w/2;
    const xNear=Math.abs(pcx-cx)<70;
    const yNear=player.y+player.h>this.y-40 && player.y<this.y+this.h+80;
    // Also classic jump-hit from below
    const hitsX=player.x+player.w>this.x+4&&player.x<this.x+this.w-4;
    const hitsY=player.y<=this.y+this.h&&player.y>this.y&&player.vy<0;
    if((xNear&&yNear)||(hitsX&&hitsY)){this.hit=true;this.bump=20;return true;}
    return false;
  }
}

// ══════════════════════════════════════════════════════════
//  SKILL COIN
// ══════════════════════════════════════════════════════════
const SKILL_LABELS=['Go','Java','Python','GCP','Spark','BigQuery','Vertex AI','RAG','LangChain','Airflow'];
class SkillCoin{
  constructor(x,y,label){this.x=x;this.y=y;this.w=22;this.h=22;this.label=label;this.collected=false;this.t=Math.random()*Math.PI*2;this.flyT=0;}
  update(){this.t+=0.06;if(this.flyT>0)this.flyT--;}
  draw(ctx,cx){
    if(this.collected&&this.flyT<=0) return;
    const sx=this.x-cx;
    if(this.collected){
      ctx.globalAlpha=this.flyT/25;
      ctx.fillStyle='#FFCC00';
      ctx.beginPath();ctx.arc(sx+11,this.y-5+(25-this.flyT)*2,9,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;return;
    }
    const bob=Math.sin(this.t)*4;
    ctx.shadowColor='rgba(255,200,0,0.5)';ctx.shadowBlur=8;
    ctx.fillStyle='#AA8800';ctx.beginPath();ctx.arc(sx+11,this.y+bob+13,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFCC00';ctx.beginPath();ctx.arc(sx+11,this.y+bob+11,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFE844';ctx.beginPath();ctx.arc(sx+9,this.y+bob+9,4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    if(this.label){
      ctx.fillStyle='rgba(255,200,0,0.9)';ctx.font='bold 9px monospace';ctx.textAlign='center';
      ctx.fillText(this.label,sx+11,this.y+bob-2);
    }
  }
}

// ══════════════════════════════════════════════════════════
//  PARTICLE
// ══════════════════════════════════════════════════════════
class Particle{
  constructor(x,y,c){this.x=x;this.y=y;this.c=c;this.vx=(Math.random()-0.5)*6;this.vy=Math.random()*-5-2;this.life=40;this.max=40;this.s=3+Math.random()*5;}
  update(){this.vy+=0.3;this.x+=this.vx;this.y+=this.vy;this.life--;}
  draw(ctx,cx){ctx.globalAlpha=this.life/this.max;ctx.fillStyle=this.c;ctx.fillRect(this.x-cx,this.y,this.s,this.s);ctx.globalAlpha=1;}
}

// ══════════════════════════════════════════════════════════
//  PLAYER
// ══════════════════════════════════════════════════════════
class Player{
  constructor(x,y){
    this.x=x;this.y=y;this.w=28;this.h=40;
    this.vx=0;this.vy=0;this.onGround=false;
    this.facing=1;this.walkF=0;this.stepT=0;
    this.jumpBuf=0;this.coyote=0;
    this.moved=false; // track first move for hint
  }
  update(plats,qblocks,skillCoins,parts,onBlockHit){
    if(IN.left){this.vx=lerp(this.vx,-SPD,0.28);this.facing=-1;this.moved=true;}
    else if(IN.right){this.vx=lerp(this.vx,SPD,0.28);this.facing=1;this.moved=true;}
    else this.vx*=0.70;
    if(IN.jump)this.jumpBuf=10; else if(this.jumpBuf>0)this.jumpBuf--;
    if(this.onGround)this.coyote=10; else if(this.coyote>0)this.coyote--;
    if(this.jumpBuf>0&&this.coyote>0){this.vy=JF;this.jumpBuf=0;this.coyote=0;SFX.jump();this.moved=true;}
    if(!IN.jump&&this.vy<-4)this.vy+=2.2;
    this.vy=Math.min(this.vy+GV,MXF);
    this.x+=this.vx; this.onGround=false;
    for(const p of plats){
      if(!ov(this,p))continue;
      if(this.vx>0)this.x=p.x-this.w; else if(this.vx<0)this.x=p.x+p.w; this.vx=0;
    }
    this.y+=this.vy;
    for(const p of plats){
      if(!ov(this,p))continue;
      if(this.vy>0){this.y=p.y-this.h;this.vy=0;this.onGround=true;}
      else{this.y=p.y+p.h;this.vy=0.5;}
    }
    // Q blocks
    for(const b of qblocks){if(b.checkHit(this)){onBlockHit(b.cardIdx);for(let i=0;i<12;i++)parts.push(new Particle(b.x+20,b.y,'#FFCC00'));}}
    // Skill coins
    for(const c of skillCoins){if(!c.collected&&ov(this,{x:c.x,y:c.y,w:c.w,h:c.h})){c.collected=true;c.flyT=25;SFX.collect();for(let i=0;i<6;i++)parts.push(new Particle(c.x+11,c.y,'#FFCC00'));}}
    // Walk anim
    if(this.onGround&&Math.abs(this.vx)>0.3){this.stepT++;if(this.stepT%7===0)this.walkF=(this.walkF+1)%4;}
    else if(this.onGround)this.walkF=0;
  }
  draw(ctx,cx){
    const sx=Math.round(this.x-cx),sy=Math.round(this.y);
    ctx.save();
    if(this.facing===-1){ctx.translate(sx+this.w/2,0);ctx.scale(-1,1);ctx.translate(-(sx+this.w/2),0);}
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(sx+14,sy+41,11,4,0,0,Math.PI*2);ctx.fill();
    // Shoes
    ctx.fillStyle='#1a0a00';
    const lf=this.onGround?(this.walkF<2?-3:3):0,rf=this.onGround?(this.walkF<2?3:-3):0;
    ctx.fillRect(sx+lf,sy+34,11,7);ctx.fillRect(sx+17+rf,sy+34,11,7);
    // Overalls
    ctx.fillStyle='#1a3a99';ctx.fillRect(sx+2,sy+22,24,14);ctx.fillRect(sx+5,sy+14,18,10);
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(sx+8,sy+16,12,4);
    // Shirt
    ctx.fillStyle='#cc1a1a';ctx.fillRect(sx+1,sy+12,26,12);
    // Arms
    ctx.fillStyle='#cc1a1a';ctx.fillRect(sx-4,sy+13,7,10);ctx.fillRect(sx+25,sy+13,7,10);
    ctx.fillStyle='#fad6ac';ctx.fillRect(sx-4,sy+21,7,5);ctx.fillRect(sx+25,sy+21,7,5);
    // Head
    ctx.fillStyle='#fad6ac';ctx.fillRect(sx+4,sy+2,20,13);
    // Hair
    ctx.fillStyle='#3a1800';ctx.fillRect(sx+4,sy+2,20,4);ctx.fillRect(sx+4,sy+2,4,8);
    // Hat
    ctx.fillStyle='#cc1a1a';ctx.fillRect(sx+2,sy-2,24,7);ctx.fillRect(sx+6,sy-8,16,8);
    // Eye
    ctx.fillStyle='#000';ctx.fillRect(sx+17,sy+6,5,5);ctx.fillStyle='#fff';ctx.fillRect(sx+19,sy+7,2,2);
    // Mustache
    ctx.fillStyle='#3a1800';ctx.fillRect(sx+8,sy+12,5,3);ctx.fillRect(sx+15,sy+12,7,3);ctx.fillRect(sx+11,sy+13,5,4);
    ctx.restore();
  }
}

function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ══════════════════════════════════════════════════════════
//  FLAG
// ══════════════════════════════════════════════════════════
function drawFlag(ctx,cx,x,gY,t){
  const sx=x-cx;
  ctx.fillStyle='rgba(129,140,248,0.6)';ctx.fillRect(sx-3,gY-280,4,280);
  ctx.fillStyle='rgba(129,140,248,0.9)';
  ctx.beginPath();ctx.moveTo(sx+1,gY-280);ctx.lineTo(sx+1,gY-220);ctx.lineTo(sx+56,gY-250);ctx.closePath();ctx.fill();
  // Glow
  ctx.shadowColor='rgba(129,140,248,0.8)';ctx.shadowBlur=20+Math.sin(t*0.05)*8;
  ctx.fillStyle='#818cf8';ctx.font='bold 22px monospace';ctx.textAlign='left';
  ctx.fillText("Let's Connect",sx+10,gY-244);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(sx-14,gY-6,28,8);
}

// ══════════════════════════════════════════════════════════
//  BACKGROUND
// ══════════════════════════════════════════════════════════
function lerp(a,b,t){return a+(b-a)*t;}
function lerpColor(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(lerp(r1,r2,t)).toString(16).padStart(2,'0');
  const g=Math.round(lerp(g1,g2,t)).toString(16).padStart(2,'0');
  const b=Math.round(lerp(b1,b2,t)).toString(16).padStart(2,'0');
  return `#${r}${g}${b}`;
}

const STARS=Array.from({length:50},(_,i)=>({x:i*137.5%1900,y:Math.random()*300,s:Math.random()<0.15?2:1}));
const CLOUDS=[
  {x:150,y:85,w:140,h:50},{x:500,y:65,w:160,h:56},{x:860,y:78,w:130,h:46},
  {x:1200,y:68,w:150,h:54},{x:1550,y:82,w:140,h:50},
];

function drawCloud(ctx,x,y,w,h,alpha=0.18){
  ctx.fillStyle=`rgba(255,255,255,${alpha})`;
  ctx.beginPath();ctx.arc(x+w*.3,y+h*.55,h*.42,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+w*.5,y+h*.38,h*.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+w*.7,y+h*.55,h*.36,0,Math.PI*2);ctx.fill();
  ctx.fillRect(x+w*.18,y+h*.5,w*.64,h*.5);
}

function drawBG(ctx,cx,W,H,zoneT,zoneIdx){
  const zi=Math.floor(zoneIdx),zt=zoneT-zi;
  const ci=Math.min(zi,ZONE_COLORS.length-1),cn=Math.min(zi+1,ZONE_COLORS.length-1);
  const c1=lerpColor(ZONE_COLORS[ci][0],ZONE_COLORS[cn][0],zt);
  const c2=lerpColor(ZONE_COLORS[ci][1],ZONE_COLORS[cn][1],zt);
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,c1);grad.addColorStop(1,c2);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // Stars (more visible in dark zones)
  for(const s of STARS){
    const sx=((s.x-cx*0.1)%W+W)%W;
    ctx.fillStyle=`rgba(255,255,255,${0.4+0.4*Math.sin(Date.now()*0.001+s.x)})`;
    ctx.fillRect(sx,s.y,s.s,s.s);
  }
  // Clouds
  for(const c of CLOUDS){
    const ccx=c.x-cx*0.2;
    const wrapped=((ccx%(W+300))+(W+300))%(W+300)-150;
    drawCloud(ctx,wrapped,c.y,c.w,c.h,0.12);
  }
}

// ══════════════════════════════════════════════════════════
//  LEVEL BUILDER
// ══════════════════════════════════════════════════════════
function buildLevel(H){
  const gY=H-80-HUD_H;
  const plats=[],qblocks=[],skillCoins=[];
  const LW=1900;

  // ── Ground sections — small 65px gaps between each zone ──
  [[0,330],[395,730],[795,1130],[1195,1530],[1595,LW]].forEach(([a,b])=>{
    plats.push(new Platform(a,gY,b-a,80,'ground'));
  });

  // ── Zone 0: About (0-330) — auto-card on spawn ──
  plats.push(new Platform(140,gY-100,90,'brick','brick'));

  // ── Zone 1: Projects (395-730) — Q block triggers card ──
  qblocks.push(new QBlock(500,gY-130,1));
  plats.push(new Platform(440,gY-70,140,'brick','brick'));
  plats.push(new Platform(630,gY-120,110,'cloud','cloud'));

  // ── Zone 2: Experience (795-1130) — Q block triggers card ──
  qblocks.push(new QBlock(900,gY-130,2));
  const companies=[
    [820,gY-90,130,'Walmart'],[950,gY-65,120,'Choice Hotels'],
    [1068,gY-110,90,'Zelle'],[1155,gY-75,90,'Amex'],
  ];
  companies.forEach(([x,y,w,l])=>plats.push(new Platform(x,y,w,16,'company',l)));

  // ── Zone 3: Skills (1195-1530) — Q block triggers card ──
  qblocks.push(new QBlock(1290,gY-130,3));
  SKILL_LABELS.forEach((label,i)=>{
    const x=1220+i*34;
    const y=gY-90-Math.abs(Math.sin(i*0.7))*80;
    skillCoins.push(new SkillCoin(x,y,label));
  });
  plats.push(new Platform(1200,gY-90,120,'brick','brick'));
  plats.push(new Platform(1360,gY-130,100,'cloud','cloud'));
  plats.push(new Platform(1470,gY-80,110,'brick','brick'));

  // ── Zone 4: Contact (1595+) — reach the flag ──
  plats.push(new Platform(1630,gY-85,160,'company','You made it!'));

  const FLAG_X=1820;
  return{plats,qblocks,skillCoins,gY,LW,FLAG_X};
}

// ══════════════════════════════════════════════════════════
//  CARD SYSTEM
// ══════════════════════════════════════════════════════════
const cardEl=document.getElementById('card');
const cardTag=document.getElementById('card-tag');
const cardTitle=document.getElementById('card-title');
const cardBody=document.getElementById('card-body');
const cardHint=document.getElementById('card-hint');
const dots=[1,2,3,4,5].map(i=>document.getElementById('d'+i));
let cardOpen=false,currentCard=-1;

function showCard(idx){
  if(idx>=CARDS.length||idx<0) return;
  SFX.reveal();
  const c=CARDS[idx];
  cardTag.textContent=c.tag;
  cardTitle.textContent=c.title;
  cardBody.innerHTML=c.body;
  cardHint.textContent=c.hint;
  dots.forEach((d,i)=>d.className='prog-dot'+(i<=idx?' active':''));
  document.getElementById('card-title').style.display = idx===0?'none':'block';
  if(idx===0)cardTag.style.fontSize='15px';else cardTag.style.fontSize='';
  cardEl.classList.add('show');
  cardOpen=true; currentCard=idx;
  showZone(CARDS[idx].zone);
  // Show hud title after about card
  if(idx>=0) document.getElementById('hud-title').style.display='block';
}
function hideCard(){cardEl.classList.remove('show');cardOpen=false;}
document.getElementById('card-close').addEventListener('click',hideCard);
window.addEventListener('keydown',e=>{if(e.code==='Escape'||e.code==='KeyE')hideCard();});

const zoneLabel=document.getElementById('zone-label');
let zLT=null;
function showZone(name){
  zoneLabel.textContent=name;
  zoneLabel.classList.add('show');
  if(zLT)clearTimeout(zLT);
  zLT=setTimeout(()=>zoneLabel.classList.remove('show'),2500);
}

// Dismiss hint after first move
const hintEl=document.getElementById('hint');
let hintGone=false;
function dismissHint(){if(!hintGone){hintGone=true;hintEl.style.opacity='0';}}

// ══════════════════════════════════════════════════════════
//  TITLE SCREEN
// ══════════════════════════════════════════════════════════
function drawTitleScreen(ctx,W,H,t){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,HUD_H,W,H-HUD_H);
  for(const s of STARS){ctx.fillStyle=`rgba(255,255,255,${0.3+0.3*Math.sin(t*0.02+s.x)})`;ctx.fillRect(s.x%W,s.y+HUD_H,s.s,s.s);}
  // Title
  ctx.textAlign='center';
  ctx.shadowColor='rgba(129,140,248,0.8)';ctx.shadowBlur=30;
  ctx.fillStyle='#818cf8';ctx.font=`bold ${Math.min(60,W/10)}px monospace`;
  ctx.fillText('SHUBHAM BAKRE',W/2,H*.38);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(226,226,245,0.7)';ctx.font=`${Math.min(18,W/34)}px monospace`;
  ctx.fillText('Senior Software Engineer · AI · Walmart',W/2,H*.38+50);
  // Blinking start
  if(Math.floor(t/28)%2===0){
    ctx.fillStyle='#FFCC00';ctx.font=`bold ${Math.min(18,W/38)}px monospace`;
    ctx.fillText(W<768?'TAP ▲ TO START':'PRESS  SPACE  TO  START',W/2,H*.62);
  }
  ctx.fillStyle='rgba(226,226,245,0.25)';ctx.font=`12px monospace`;
  ctx.fillText('Walk right through 5 zones to explore my full profile',W/2,H*.62+32);
}

// ══════════════════════════════════════════════════════════
//  MAIN
// ══════════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;canvas.style.marginTop=HUD_H+'px';canvas.height=H-HUD_H;H=canvas.height;}
resize();
window.addEventListener('resize',resize);

let state='title',t=0;
let player,plats,qblocks,skillCoins,parts,camX,gY,LW,FLAG_X;
let zoneIdx=0,zoneFrac=0; // for sky color lerp
let triggeredFlag=false;

// Zone trigger X positions (where card auto-shows for zone 0)
const ZONE_TRIGGERS=[
  {x:80,cardIdx:0,done:false},   // About — at spawn
];

function init(){
  const lv=buildLevel(H);
  plats=lv.plats;qblocks=lv.qblocks;skillCoins=lv.skillCoins;
  gY=lv.gY;LW=lv.LW;FLAG_X=lv.FLAG_X;
  player=new Player(80,gY-80);
  parts=[];camX=0;triggeredFlag=false;
  ZONE_TRIGGERS.forEach(z=>z.done=false);
  // Auto-show about card after short delay
  setTimeout(()=>showCard(0),600);
}

function tick(){
  t++;
  if(state==='title'){if(IN.jump||IN.right){state='play';init();}return;}
  if(state!=='play') return;

  player.update(plats,qblocks,skillCoins,parts,(cardIdx)=>{showCard(cardIdx);});
  skillCoins.forEach(c=>c.update());
  parts=parts.filter(p=>{p.update();return p.life>0;});

  if(player.moved) dismissHint();

  // Zone triggers
  for(const z of ZONE_TRIGGERS){
    if(!z.done&&player.x>z.x){z.done=true;showCard(z.cardIdx);}
  }

  // Flag trigger
  if(!triggeredFlag&&player.x>FLAG_X-60){
    triggeredFlag=true;showCard(4);
  }

  // Camera
  const targetCam=player.x-W*0.35;
  camX+=(targetCam-camX)*0.10;
  camX=Math.max(0,Math.min(camX,LW-W));

  // Zone color tracking based on camera position
  const zoneWidth=LW/ZONE_COLORS.length;
  zoneIdx=camX/zoneWidth;

  // Death (fell off)
  if(player.y>H+100){
    player=new Player(Math.max(80,player.x-200),gY-80);
    camX=Math.max(0,player.x-W*0.3);
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  if(state==='title'){drawTitleScreen(ctx,W,H,t);return;}

  drawBG(ctx,camX,W,H,zoneIdx,zoneIdx);

  // Ground line
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,gY+80,W,H-gY-80);

  plats.forEach(p=>p.draw(ctx,camX,W));
  qblocks.forEach(b=>b.draw(ctx,camX));
  skillCoins.forEach(c=>c.draw(ctx,camX));
  parts.forEach(p=>p.draw(ctx,camX));
  drawFlag(ctx,camX,FLAG_X,gY,t);
  player.draw(ctx,camX);

  // Zone name in world space (ambient)
  const zoneNames=[
    {x:165,name:'About Me',col:'rgba(226,226,245,0.12)'},
    {x:560,name:'Projects',col:'rgba(226,226,245,0.12)'},
    {x:960,name:'Experience',col:'rgba(226,226,245,0.12)'},
    {x:1360,name:'Skills',col:'rgba(226,226,245,0.12)'},
    {x:1700,name:"Let's Connect",col:'rgba(129,140,248,0.2)'},
  ];
  ctx.textAlign='center';
  for(const z of zoneNames){
    const sx=z.x-camX;
    if(sx<-200||sx>W+200) continue;
    ctx.fillStyle=z.col;ctx.font=`bold ${Math.min(64,W/8)}px monospace`;
    ctx.fillText(z.name,sx,gY-10);
  }
}

function loop(){tick();render();requestAnimationFrame(loop);}
loop();
